name: Daily Backtest Run

on:
  schedule:
    # Every weekday at 22:00 UTC (after US market close, Mon-Fri)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: false
        default: 'baselines_only'
        type: choice
        options:
          - baselines_only       # All deterministic baselines — no LLM calls, no API cost
          - technical_momentum   # RSI/MACD/trend scoring strategy — no LLM calls
          - sixty_forty          # 60% equities / 40% bonds benchmark — no LLM calls
          - equal_weight         # Equal weight across all 11 instruments — no LLM calls
          - full_system          # Full multi-agent council (GPT-4o + Claude + Gemini + DeepSeek) — uses LLM APIs

env:
  PYTHON_VERSION: '3.12'

jobs:
  fetch-data:
    name: Fetch Latest Market Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Fetch market data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_historical_data.py

  run-baselines:
    name: Run Deterministic Baselines
    needs: fetch-data
    runs-on: ubuntu-latest
    # Always runs — no LLM API calls, no cost
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.mode == 'baselines_only' ||
      github.event.inputs.mode == 'technical_momentum' ||
      github.event.inputs.mode == 'sixty_forty' ||
      github.event.inputs.mode == 'equal_weight'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run selected strategy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "technical_momentum" ]; then
            python scripts/run_backtest.py --strategy technical_momentum
          elif [ "$MODE" = "sixty_forty" ]; then
            python scripts/run_backtest.py --strategy sixty_forty
          elif [ "$MODE" = "equal_weight" ]; then
            python scripts/run_backtest.py --strategy equal_weight
          else
            python scripts/run_ablation.py --baselines-only
            python scripts/run_backtest.py --strategy technical_momentum
          fi

      - name: Upload ablation results
        uses: actions/upload-artifact@v4
        with:
          name: ablation-results-${{ github.run_id }}
          path: data/ablation_results.json
          retention-days: 90

  run-full-system:
    name: Run Full Multi-Agent Council
    needs: fetch-data
    runs-on: ubuntu-latest
    # Runs on automatic schedule OR when explicitly selected in manual trigger
    # Note: uses LLM APIs (GPT-4o, Claude, Gemini, DeepSeek) — incurs API costs
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.mode == 'full_system'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full multi-agent backtest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/run_ablation.py --variants full,no_narrative,technical_momentum
