name: Weekly Backtest Run

on:
  schedule:
    # Every Friday at 22:00 UTC (after US market close)
    - cron: '0 22 * * 5'
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Strategy to run'
        required: false
        default: 'technical_momentum'
        type: choice
        options:
          - technical_momentum
          - sixty_forty
          - equal_weight
          - baselines_only

env:
  PYTHON_VERSION: '3.12'

jobs:
  fetch-data:
    name: Fetch Latest Market Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Fetch market data
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_historical_data.py

  run-backtest:
    name: Run Backtest
    needs: fetch-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run baselines
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_ablation.py --baselines-only

      - name: Run technical momentum backtest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/run_backtest.py --strategy technical_momentum

      - name: Upload ablation results
        uses: actions/upload-artifact@v4
        with:
          name: ablation-results
          path: data/ablation_results.json
          retention-days: 90

  run-full-system:
    name: Run Full Multi-Agent System
    needs: fetch-data
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.strategy == ''
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run full multi-agent backtest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: |
          python scripts/run_ablation.py --variants full,no_narrative,technical_momentum
