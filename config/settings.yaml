# Portfolio Constraints
constraints:
  max_single_position: 0.25
  max_equity_concentration: 0.40
  min_cash_buffer: 0.05
  max_leverage: 1.0
  max_turnover_per_rebalance: 0.30
  min_trade_threshold: 0.005  # Skip rebalances < 0.5%

# Transaction Costs
costs:
  round_trip_bps: 30  # 30 bps round-trip (15 bps each way)

# Backtest Parameters
backtest:
  initial_capital: 1_000_000
  start_date: "2021-01-01"
  end_date: "2024-12-31"
  rebalance_frequency: "weekly"  # Rebalance every Friday close
  rebalance_day: 4  # 0=Monday, 4=Friday

# Council Parameters
council:
  consensus_threshold: 0.6
  max_debate_rounds: 2
