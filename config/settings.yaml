    asset_class: equity
    slippage_bps: 0
  NASDAQ100:
    ticker: "QQQ"
    asset_class: equity
    slippage_bps: 0
  RUSSELL2000:
    ticker: "IWM"
    asset_class: equity
    slippage_bps: 5
  US_10Y:
    ticker: "TLT"
    asset_class: fixed_income
    slippage_bps: 0
  US_2Y:
    ticker: "SHY"
    asset_class: fixed_income
    slippage_bps: 0
  GOLD:
    ticker: "GLD"
    asset_class: commodity
    slippage_bps: 0
  OIL_WTI:
    ticker: "USO"
    asset_class: commodity
    slippage_bps: 5
  DXY:
    ticker: "UUP"
    asset_class: currency
    slippage_bps: 5
  VIX:
    ticker: "VIXY"
    asset_class: volatility
    slippage_bps: 5
  MSCI_EM:
