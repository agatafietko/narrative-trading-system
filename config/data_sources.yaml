# Data Source Configuration

yfinance:
  # Market data fetched via yfinance (no API key needed)
  fetch_buffer_minutes: 15  # Wait 15 min after close for settlement
  history_years: 5

fred:
  # Federal Reserve Economic Data
  base_url: "https://api.stlouisfed.org/fred"
  series:
    - id: DGS10
      name: "10-Year Treasury Yield"
      frequency: daily
    - id: DGS2
      name: "2-Year Treasury Yield"
      frequency: daily
    - id: T10Y2Y
      name: "10Y-2Y Spread"
      frequency: daily
    - id: CPIAUCSL
      name: "CPI All Urban Consumers"
      frequency: monthly
    - id: UNRATE
      name: "Unemployment Rate"
      frequency: monthly
    - id: GDP
      name: "Gross Domestic Product"
      frequency: quarterly
    - id: FEDFUNDS
      name: "Federal Funds Rate"
      frequency: monthly
    - id: VIXCLS
      name: "CBOE Volatility Index"
      frequency: daily

newsapi:
  base_url: "https://newsapi.org/v2"
  # Free tier: 100 requests/day, 1 month history
  domains:
    - reuters.com
    - bloomberg.com
    - cnbc.com
    - ft.com
    - wsj.com
    - economist.com
  keywords:
    - "federal reserve"
    - "interest rates"
    - "inflation"
    - "GDP"
    - "earnings"
    - "oil prices"
    - "gold"
    - "bitcoin"
    - "stock market"
    - "recession"
    - "trade war"
    - "geopolitical"

reddit:
  subreddits:
    - wallstreetbets
    - investing
    - economics
    - stocks
    - CryptoCurrency
  posts_per_subreddit: 50
  sort: hot

gdelt:
  # GDELT Global Knowledge Graph
  base_url: "http://data.gdeltproject.org/gdeltv2"
  themes:
    - ECON_INTEREST_RATE
    - ECON_INFLATION
    - ECON_RECESSION
    - ECON_TRADE
    - ECON_OIL
    - ECON_GOLD
    - ECON_CRYPTO
    - EPU  # Economic Policy Uncertainty

rss_feeds:
  - name: Reuters Business
    url: "https://www.reutersagency.com/feed/"
  - name: CNBC Top News
    url: "https://search.cnbc.com/rs/search/combinedcms/view.xml?partnerId=wrss01&id=100003114"
  - name: AP Business
    url: "https://rsshub.app/apnews/topics/business"
  - name: Fed Press Releases
    url: "https://www.federalreserve.gov/feeds/press_all.xml"
